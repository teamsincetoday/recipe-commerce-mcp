# Smithery listing for recipe-commerce-mcp
# Place this as smithery.yaml in the package root before publishing to Smithery
# GitHub repo: create with `gh repo create teamsincetoday/recipe-commerce-mcp --public`
# Update github link below once repo is live.

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - openaiApiKey
    properties:
      openaiApiKey:
        type: string
        description: OpenAI API key for GPT-4o-mini ingredient and brand extraction
      apiKeys:
        type: string
        description: Comma-separated paid API keys (unlocks unlimited calls)
      cacheDir:
        type: string
        description: SQLite cache path (default ./data/cache.db)
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["recipe-commerce-mcp"],
      env: {
        OPENAI_API_KEY: config.openaiApiKey,
        MCP_API_KEYS: config.apiKeys ?? "",
        CACHE_DIR: config.cacheDir ?? "./data/cache.db",
      }
    })

